server:
  port: 8084

spring:
  datasource:
    url: jdbc:mysql://${UNDERWRITING_DATABASE_HOST:localhost}:${UNDERWRITING_DATABASE_PORT:3306}/${UNDERWRITING_DATABASE_NAME:loanflow_underwriting_db}
    username: ${UNDERWRITING_DATABASE_USER:loanflow}
    password: ${UNDERWRITING_DATABASE_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: false
    locations: classpath:db/migration