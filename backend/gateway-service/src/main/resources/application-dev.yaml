
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true

server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: identity-route
          uri: lb://identity-service
          predicates:
            - Path=/identityService/**
        # - id: notification-route
        #   uri: http://localhost:8083
        #   predicates:
        #     - Path=/notificationService/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/